name: Bug report
description: Report a reproducible problem in the open-source MCP server.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve Krakenfy Drive MCP. Remove credentials, tokens, file contents, and personal information before submitting.
  - type: input
    id: version
    attributes:
      label: Version or commit
      placeholder: 1.1.0 or commit SHA
    validations:
      required: true
  - type: dropdown
    id: client
    attributes:
      label: MCP client
      options:
        - Claude Desktop
        - Codex
        - Cursor
        - Other
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the observed behavior and the expected behavior.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction steps
      placeholder: |
        1. Configure…
        2. Call…
        3. Observe…
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Sanitized logs
      description: Do not include OAuth credentials, tokens, file contents, email addresses, or private IDs.
      render: shell
  - type: checkboxes
    id: safety
    attributes:
      label: Safety check
      options:
        - label: I removed credentials, tokens, private file contents, and personal information.
          required: true
